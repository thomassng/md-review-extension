name: Build & Publish Latest

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package extension
        run: node scripts/package.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-rich-review-latest
          path: dist/*.zip

      - name: Update "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automatically built from the latest commit on `main`.

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            Download the `.zip` below, unzip, and load as an unpacked extension.
          files: dist/*.zip
          prerelease: true
          make_latest: false
